<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#111b21">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="description" content="Max - Tu asistente personal">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/jpeg" href="logo.jpg">
<link rel="apple-touch-icon" href="logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<title>Max</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --green: #25d366;
  --green-dark: #128c7e;
  --dark: #111b21;
  --header: #202c33;
  --input-bg: #2a3942;
  --bubble-out: #005c4b;
  --bubble-in: #202c33;
  --text: #e9edef;
  --text-secondary: #8696a0;
}

html, body {
  font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--dark);
  color: var(--text);
  height: 100%;
  overflow: hidden;
}

/* ===== PROFILE SCREEN - Netflix Style ===== */
.profile-screen {
  position: fixed;
  inset: 0;
  background: #0a1628;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 1000;
}

.profile-screen.hidden { display: none; }

.profile-logo {
  width: 120px;
  height: 120px;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 30px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

.profile-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.profile-subtitle {
  color: #808080;
  margin-bottom: 30px;
  font-size: 18px;
  font-weight: 500;
}

.profiles-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
  max-width: 400px;
  width: 100%;
}

@media (min-width: 450px) {
  .profiles-grid { grid-template-columns: repeat(4, 1fr); max-width: 500px; }
}

/* Profile Card - Netflix Style */
.profile-card {
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  padding: 16px 12px;
  border-radius: 8px;
  transition: all 0.3s ease;
  background: transparent;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.profile-card:active {
  transform: scale(0.95);
  background: rgba(255,255,255,0.1);
}

.profile-card:hover {
  background: rgba(255,255,255,0.05);
}

.profile-card:hover .profile-avatar {
  border-color: #fff;
  transform: scale(1.05);
}

.profile-avatar {
  width: 80px;
  height: 80px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin-bottom: 12px;
  background: #333;
  border: 2px solid transparent;
  transition: all 0.3s ease;
  overflow: hidden;
}

.profile-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.profile-name {
  font-size: 13px;
  color: #808080;
  transition: color 0.3s ease;
  white-space: nowrap;
  overflow: visible;
}

.profile-card:hover .profile-name {
  color: #fff;
}

/* ===== MAIN APP ===== */
.app-container {
  display: none;
  flex-direction: column;
  height: 100vh;
  background: var(--dark);
}

.app-container.active { display: flex; }

/* ===== HEADER ===== */
.app-header {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  background: var(--header);
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  height: 56px;
}

.header-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  margin-right: 10px;
  background: var(--input-bg);
  cursor: pointer;
  flex-shrink: 0;
  overflow: hidden;
}

.header-avatar img { width: 100%; height: 100%; object-fit: cover; }
.header-info { flex: 1; min-width: 0; }
.header-name { font-weight: 500; font-size: 15px; white-space: nowrap; overflow: visible; }
.header-status { font-size: 12px; color: var(--green); }
.header-actions { display: flex; gap: 4px; }

.header-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--text-secondary);
  font-size: 18px;
  cursor: pointer;
  transition: background 0.2s;
}

.header-btn:active { background: var(--input-bg); }

/* ===== CHAT VIEW ===== */
.chat-view {
  flex: 1;
  display: flex;
  flex-direction: column;
  margin-top: 56px;
  margin-bottom: 60px;
  min-height: 0;
}

/* Desktop: more top spacing below header */
@media (min-width: 769px) {
  .chat-view {
    margin-top: 60px;
  }
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px 12px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60"><rect fill="%230b141a" width="60" height="60"/><circle cx="30" cy="30" r="1" fill="%23ffffff08"/></svg>');
  background-color: #0b141a;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

.message-date {
  text-align: center;
  color: var(--text-secondary);
  font-size: 11px;
  padding: 6px 10px;
  margin: 10px auto;
  background: rgba(0,0,0,0.5);
  border-radius: 6px;
}

/* ===== MESSAGE BUBBLES - COMPACT ===== */
.message {
  max-width: 75%;
  width: -moz-fit-content;
  width: fit-content;
  padding: 5px 9px 5px 10px;
  border-radius: 8px;
  position: relative;
  font-size: 14.2px;
  line-height: 1.38;
  word-wrap: break-word;
  overflow-wrap: break-word;
}

.message.from-user {
  align-self: flex-end;
  background: var(--bubble-out);
  border-top-right-radius: 4px;
}

.message.from-max {
  align-self: flex-start;
  background: var(--bubble-in);
  border-top-left-radius: 4px;
}

.message-text {
  color: var(--text);
  white-space: pre-wrap;
}

.message-meta {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 3px;
  margin-top: 2px;
  float: right;
  margin-left: 8px;
}

.message-time {
  font-size: 10.5px;
  color: rgba(255,255,255,0.5);
}

.check-mark { color: #53bdeb; font-size: 15px; }

.typing-dots {
  display: inline-flex;
  gap: 3px;
  padding: 3px 0;
}

.typing-dots span {
  width: 6px;
  height: 6px;
  background: var(--text-secondary);
  border-radius: 50%;
  animation: typing 1.2s infinite;
}

.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes typing {
  0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
  30% { opacity: 1; transform: scale(1); }
}

/* ===== INPUT AREA ===== */
.input-area {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--header);
  padding: 6px 8px;
  padding-bottom: calc(6px + env(safe-area-inset-bottom));
  display: flex;
  gap: 6px;
  align-items: flex-end;
  z-index: 100;
}

.input-wrapper {
  flex: 1;
  display: flex;
  align-items: flex-end;
  background: var(--input-bg);
  border-radius: 20px;
  padding: 0 4px;
  min-height: 38px;
}

.input-btn {
  background: none;
  border: none;
  font-size: 20px;
  padding: 8px 6px;
  cursor: pointer;
  color: var(--text-secondary);
  transition: color 0.2s;
}

.input-btn:active { color: var(--text); }

.chat-input {
  flex: 1;
  background: transparent;
  border: none;
  padding: 9px 2px;
  color: var(--text);
  font-size: 14.5px;
  font-family: inherit;
  line-height: 1.35;
  resize: none;
  max-height: 90px;
  min-height: 22px;
}

.chat-input:focus { outline: none; }
.chat-input::placeholder { color: var(--text-secondary); }

.send-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  background: var(--green);
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.1s, background 0.2s;
  flex-shrink: 0;
}

.send-btn:active { transform: scale(0.9); background: var(--green-dark); }

/* ===== EMOJI PICKER ===== */
.emoji-picker {
  display: none;
  position: fixed;
  bottom: 54px;
  left: 0;
  right: 0;
  background: var(--header);
  border-radius: 16px 16px 0 0;
  padding: 10px;
  max-height: 200px;
  overflow-y: auto;
  z-index: 99;
}

.emoji-picker.show { display: block; }

.emoji-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 2px;
}

.emoji-item {
  font-size: 24px;
  padding: 8px 4px;
  cursor: pointer;
  text-align: center;
  border-radius: 6px;
  transition: background 0.15s, transform 0.1s;
}

.emoji-item:active { background: var(--input-bg); transform: scale(1.15); }

/* ===== FILE INPUT ===== */
.file-input { display: none; }

.file-preview {
  display: none;
  position: fixed;
  bottom: 54px;
  left: 8px;
  right: 8px;
  background: var(--header);
  border-radius: 12px;
  padding: 10px;
  z-index: 98;
}

.file-preview.show { display: block; }

.file-preview img {
  max-width: 100%;
  max-height: 180px;
  border-radius: 8px;
  display: block;
  margin-bottom: 8px;
}

.file-name {
  font-size: 12px;
  color: var(--text-secondary);
  margin-bottom: 10px;
}

.file-actions {
  display: flex;
  gap: 8px;
}

.file-actions button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
  transition: transform 0.1s;
}

.file-actions button:active { transform: scale(0.97); }
.file-actions .cancel { background: var(--input-bg); color: var(--text); }
.file-actions .send { background: var(--green); color: white; }

/* ===== MODALS ===== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.modal-overlay.show { display: flex; }

.modal-content {
  background: var(--header);
  border-radius: 14px;
  width: 100%;
  max-width: 360px;
  max-height: 80vh;
  overflow-y: auto;
}

.modal-header {
  padding: 16px;
  border-bottom: 1px solid var(--input-bg);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.modal-title { font-size: 17px; font-weight: 600; }
.modal-close { background: none; border: none; color: var(--text-secondary); font-size: 26px; cursor: pointer; line-height: 1; }

.modal-body { padding: 12px; }

.setting-item {
  display: flex;
  align-items: center;
  padding: 14px;
  background: var(--input-bg);
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: background 0.2s;
}

.setting-item:active { background: #2a3a47; }
.setting-icon { font-size: 20px; margin-right: 12px; }
.setting-text { flex: 1; }
.setting-label { font-weight: 500; font-size: 14px; }
.setting-desc { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

/* ===== AVATAR/WALLPAPER PICKER ===== */
.avatar-picker, .wallpaper-picker {
  display: grid;
  gap: 10px;
  padding: 12px;
}

.avatar-picker { grid-template-columns: repeat(5, 1fr); }
.wallpaper-picker { grid-template-columns: repeat(2, 1fr); }

.avatar-option {
  aspect-ratio: 1;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color 0.2s, transform 0.2s;
}

.avatar-option:active { transform: scale(1.1); }
.avatar-option.selected { border-color: var(--green); }

.wallpaper-option {
  height: 55px;
  border-radius: 10px;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  cursor: pointer;
  border: 2px solid transparent;
  padding: 6px;
  transition: transform 0.2s;
}

.wallpaper-option:active { transform: scale(0.98); }
.wallpaper-option.selected { border-color: var(--green); }
.wallpaper-option span { font-size: 10px; background: rgba(0,0,0,0.6); padding: 3px 6px; border-radius: 4px; }

/* ===== CALL MODAL ===== */
.call-modal {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.95);
  z-index: 300;
  align-items: center;
  justify-content: center;
}

.call-modal.show { display: flex; }
.call-content { text-align: center; }
.call-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--green); display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 14px; }
.call-name { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
.call-status { color: var(--text-secondary); margin-bottom: 20px; }
.call-btn { width: 50px; height: 50px; border-radius: 50%; border: none; font-size: 20px; cursor: pointer; }
.call-btn.end { background: #ef4444; color: white; }

/* ===== ANIMATIONS ===== */
.fade-in { animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ===== SCROLLBAR ===== */
.chat-messages::-webkit-scrollbar { width: 5px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--input-bg); border-radius: 3px; }
</style>
</head>
<body>

<!-- PROFILE SCREEN -->
<div class="profile-screen" id="profileScreen">
  <div class="profile-logo"><img src="logo.jpg" alt="Max"></div>
  <p class="profile-subtitle">¿Quién está usando Max?</p>
  <div class="profiles-grid" id="profilesGrid">
    <div class="profile-card" onclick="handleProfileClick('moises', '📚')">
      <div class="profile-avatar">📚</div>
      <div class="profile-name">Moisés</div>
    </div>
    <div class="profile-card" onclick="handleProfileClick('luisana', '👩‍🍳')">
      <div class="profile-avatar">👩‍🍳</div>
      <div class="profile-name">Luisana</div>
    </div>
    <div class="profile-card" onclick="handleProfileClick('valentina', '👩‍🎨')">
      <div class="profile-avatar">👩‍🎨</div>
      <div class="profile-name">Valentina</div>
    </div>
    <div class="profile-card" onclick="handleProfileClick('amelia', '🎮')">
      <div class="profile-avatar">🎮</div>
      <div class="profile-name">Amelia</div>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div class="app-container" id="appContainer">
  <header class="app-header">
    <div class="header-avatar" id="headerAvatar" onclick="showSettings()">
      <span id="headerEmoji">👤</span>
    </div>
    <div class="header-info">
      <div class="header-name" id="headerName">Max</div>
      <div class="header-status" id="headerStatus">en línea</div>
    </div>
    <div class="header-actions">
      <button class="header-btn" onclick="window.location.href='correspondencia.html'" title="Correspondencia IMSS">📋</button>
      <button class="header-btn" onclick="window.location.href='vacaciones.html'" title="Vacaciones">🏖️</button>
      <button class="header-btn" onclick="window.location.href='pases.html'" title="Pases de Entrada/Salida">🎫</button>
      <button class="header-btn" onclick="window.location.href='contratacion.html'" title="Programa de Contratación">🏛️</button>
      <button class="header-btn" onclick="startVoiceCall()" title="Llamada">📞</button>
      <button class="header-btn" onclick="showSettings()" title="Config">⋮</button>
    </div>
  </header>
  
  <div class="chat-view" id="chatView">
    <div class="chat-messages" id="chatMessages"></div>
  </div>
  
  <!-- FILE PREVIEW -->
  <div class="file-preview" id="filePreview">
    <img id="previewImage" src="" alt="" style="display:none">
    <div class="file-name" id="fileName"></div>
    <div class="file-actions">
      <button class="cancel" onclick="cancelFile()">Cancelar</button>
      <button class="send" onclick="sendFile()">Enviar</button>
    </div>
  </div>
  
  <!-- EMOJI PICKER -->
  <div class="emoji-picker" id="emojiPicker">
    <div class="emoji-grid" id="emojiGrid"></div>
  </div>
  
  <!-- INPUT AREA -->
  <div class="input-area">
    <div class="input-wrapper">
      <button class="input-btn" onclick="toggleEmojiPicker()">😊</button>
      <button class="input-btn" onclick="attachFile()">📎</button>
      <textarea class="chat-input" id="chatInput" placeholder="Escribe un mensaje..." rows="1"></textarea>
    </div>
    <button class="send-btn" onclick="sendMessage()">➤</button>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Configuración</h2>
      <button class="modal-close" onclick="hideSettings()">×</button>
    </div>
    <div class="modal-body">
      <div class="setting-item" onclick="showAvatarPicker()">
        <span class="setting-icon">👤</span>
        <div class="setting-text">
          <div class="setting-label">Mi Perfil</div>
          <div class="setting-desc" id="profileNameSetting">Moisés</div>
        </div>
      </div>
      <div class="setting-item" onclick="showWallpaperPicker()">
        <span class="setting-icon">🖼️</span>
        <div class="setting-text">
          <div class="setting-label">Fondo</div>
          <div class="setting-desc">Personalizar fondo</div>
        </div>
      </div>
      <div class="setting-item" onclick="switchProfile()">
        <span class="setting-icon">🔄</span>
        <div class="setting-text">
          <div class="setting-label">Cambiar Perfil</div>
          <div class="setting-desc">Seleccionar otro usuario</div>
        </div>
      </div>
      <div class="setting-item" onclick="clearChat()">
        <span class="setting-icon">🗑️</span>
        <div class="setting-text">
          <div class="setting-label">Limpiar Chat</div>
          <div class="setting-desc">Borrar mensajes</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- AVATAR MODAL -->
<div class="modal-overlay" id="avatarModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Avatar</h2>
      <button class="modal-close" onclick="hideAvatarPicker()">×</button>
    </div>
    <div class="avatar-picker" id="avatarPicker"></div>
    <div style="padding:12px">
      <div class="setting-item" onclick="uploadAvatar()">
        <span class="setting-icon">📷</span>
        <div class="setting-text">
          <div class="setting-label">Subir Imagen</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- WALLPAPER MODAL -->
<div class="modal-overlay" id="wallpaperModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title">Fondo</h2>
      <button class="modal-close" onclick="hideWallpaperPicker()">×</button>
    </div>
    <div class="wallpaper-picker" id="wallpaperPicker"></div>
  </div>
</div>

<!-- CALL MODAL -->
<div class="call-modal" id="callModal">
  <div class="call-content">
    <div class="call-avatar">📚</div>
    <div class="call-name">Max</div>
    <div class="call-status" id="callStatus">Llamando...</div>
    <button class="call-btn end" onclick="endCall()">📞</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*,.pdf,.doc,.docx,.txt" style="display:none" onchange="handleFileSelect(event)">
<input type="file" id="avatarUpload" accept="image/*" style="display:none" onchange="handleAvatarUpload(event)">

<script src="app-v3.js"></script>
</body>
</html>
