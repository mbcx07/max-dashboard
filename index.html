<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Max Dash">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Dashboard de Max</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#6366f1;--pd:#4f46e5;--s:#f472b6;--a:#22d3ee;--bg:#0f172a;--c:#1e293b;--t:#f1f5f9;--ts:#94a3b8;--g:#22c55e;--w:#f59e0b;--r:#ef4444}

/* Pokemon-style font */
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
.font-pixel{font-family:'Press Start 2P',cursive}

body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden}

/* Install prompt */
.install-prompt{position:fixed;top:0;left:0;right:0;background:linear-gradient(135deg,var(--p),var(--s));padding:1rem;text-align:center;z-index:1000;display:none;animation:slideDown .5s}
.install-prompt.show{display:block}
.install-btn{background:#fff;color:var(--p);border:none;padding:.5rem 1.5rem;border-radius:8px;font-weight:bold;margin-left:1rem;cursor:pointer}
.install-close{background:none;border:none;color:#fff;font-size:1.5rem;cursor:pointer;margin-left:1rem}

@keyframes slideDown{from{transform:translateY(-100%)}to{transform:translateY(0)}}

.container{max-width:800px;margin:0 auto;padding:1rem}

/* Header - Pokemon style */
.header{display:flex;justify-content:space-between;align-items:center;padding:1rem;background:var(--c);border-radius:16px;margin-bottom:1rem;border:3px solid var(--p);box-shadow:0 4px 0 var(--pd);position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent,rgba(255,255,255,.1),transparent);animation:shine 3s infinite}
@keyframes shine{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.logo{display:flex;align-items:center;gap:.75rem;position:relative;z-index:1}
.logo h1{font-size:.9rem;background:linear-gradient(135deg,var(--p),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status{display:flex;align-items:center;gap:.5rem;padding:.5rem 1rem;background:rgba(34,197,94,.2);border-radius:20px;font-size:.75rem;border:2px solid var(--g)}
.pulse{width:8px;height:8px;background:var(--g);border-radius:50%;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.5}}

/* Agent cards - Pokemon trainer style */
.agents-section{margin-bottom:1.5rem}
.section-title{font-size:.65rem;color:var(--ts);margin-bottom:.75rem;text-transform:uppercase;letter-spacing:1px;display:flex;align-items:center;gap:.5rem}
.section-title::before{content:'';width:20px;height:3px;background:linear-gradient(90deg,var(--p),var(--a));border-radius:2px}

.agents-grid{display:grid;gap:.75rem}

.agent-card{background:var(--c);border-radius:16px;padding:1rem;border:3px solid var(--ts);position:relative;overflow:hidden;cursor:pointer;transition:all .3s}
.agent-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.3)}
.agent-card.active{border-color:var(--g);box-shadow:0 0 20px rgba(34,197,94,.3)}
.agent-card.working{border-color:var(--a);box-shadow:0 0 20px rgba(34,211,238,.3)}

.agent-card::after{content:'';position:absolute;bottom:0;right:0;width:60px;height:60px;background:linear-gradient(135deg,transparent,rgba(255,255,255,.05));border-radius:16px 0 16px 0}

.agent-header{display:flex;align-items:center;gap:.75rem;margin-bottom:.5rem}
.agent-sprite{width:48px;height:48px;image-rendering:pixelated;image-rendering:crisp-edges}
.agent-info{flex:1}
.agent-name{font-weight:bold;font-size:1rem;display:flex;align-items:center;gap:.5rem}
.agent-name .badge{font-size:.6rem;padding:2px 6px;border-radius:4px;background:var(--p)}
.agent-role{font-size:.75rem;color:var(--ts)}

.agent-status{display:flex;align-items:center;gap:.5rem;font-size:.7rem;margin-top:.5rem;padding:.5rem;background:rgba(255,255,255,.05);border-radius:8px}
.agent-status .dot{width:6px;height:6px;border-radius:50%;animation:blink 1s infinite}
.agent-status .dot.active{background:var(--g)}
.agent-status .dot.working{background:var(--a)}
.agent-status .dot.idle{background:var(--ts)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* Projects - Pokemon PC boxes style */
.projects-section{margin-bottom:1.5rem}
.project-card{background:var(--c);border-radius:16px;padding:1rem;margin-bottom:.75rem;border-left:4px solid var(--p);position:relative;overflow:hidden}
.project-card.active{border-left-color:var(--g)}
.project-card.active::before{content:'';position:absolute;top:0;right:0;width:0;height:0;border-style:solid;border-width:0 30px 30px 0;border-color:transparent var(--g) transparent transparent}
.project-header{display:flex;justify-content:space-between;align-items:start;margin-bottom:.5rem}
.project-name{font-weight:bold;font-size:1rem}
.project-desc{font-size:.8rem;color:var(--ts);margin-bottom:.5rem}
.progress-container{background:rgba(255,255,255,.1);border-radius:8px;height:8px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.progress-bar{height:100%;background:linear-gradient(90deg,var(--g),var(--a));border-radius:8px;transition:width .5s ease}
.progress-text{font-size:.65rem;color:var(--ts);margin-top:.25rem;text-align:right}

/* Stats - Pokemon status style */
.stats-section{margin-bottom:1.5rem}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.75rem}
.stat-card{background:var(--c);border-radius:16px;padding:1rem;text-align:center;border:2px solid rgba(255,255,255,.1)}
.stat-icon{font-size:1.5rem;margin-bottom:.25rem}
.stat-value{font-size:1.5rem;font-weight:bold;background:linear-gradient(135deg,var(--p),var(--a));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:.7rem;color:var(--ts)}

/* Activity - Pokemon battle log style */
.activity-section{margin-bottom:1.5rem}
.activity-log{background:var(--c);border-radius:16px;padding:.75rem;max-height:200px;overflow-y:auto;border:2px solid rgba(255,255,255,.1)}
.activity-item{display:flex;gap:.75rem;padding:.5rem;border-radius:8px;transition:background .2s}
.activity-item:hover{background:rgba(255,255,255,.05)}
.activity-icon{font-size:1.25rem;width:28px;text-align:center}
.activity-content{flex:1}
.activity-text{font-size:.85rem}
.activity-time{font-size:.65rem;color:var(--ts);margin-top:.15rem}

/* Footer */
.footer{text-align:center;padding:1rem;color:var(--ts);font-size:.7rem;border-top:1px solid rgba(255,255,255,.1);margin-top:1rem}
.footer p{margin-bottom:.25rem}

/* Pokemon-style animations */
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}75%{transform:translateX(2px)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}

/* Sprite animation */
.sprite-animate{animation:bounce 1s infinite}
.sprite-working{animation:shake .3s infinite}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(255,255,255,.05);border-radius:3px}
::-webkit-scrollbar-thumb{background:var(--p);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--pd)}

/* Loading screen */
.loading-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999}
.loading-screen.hidden{display:none}
.loading-pokeball{width:60px;height:60px;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.loading-text{margin-top:1rem;font-size:.8rem;color:var(--ts)}
</style>
</head>
<body>

<!-- Loading Screen -->
<div class="loading-screen" id="loading">
  <svg class="loading-pokeball" viewBox="0 0 100 100">
    <circle cx="50" cy="50" r="45" fill="#fff" stroke="#333" stroke-width="5"/>
    <path d="M5 50 H95" stroke="#333" stroke-width="5"/>
    <circle cx="50" cy="50" r="12" fill="#fff" stroke="#333" stroke-width="5"/>
    <path d="M5 50 A45 45 0 0 0 95 50" fill="#ef4444"/>
  </svg>
  <p class="loading-text">Cargando...</p>
</div>

<!-- Install Prompt -->
<div class="install-prompt" id="installPrompt">
  <span>📱 ¡Instala la app en tu celular!</span>
  <button class="install-btn" id="installBtn">Instalar</button>
  <button class="install-close" id="installClose">&times;</button>
</div>

<div class="container">

<!-- Header -->
<div class="header">
  <div class="logo">
    <span style="font-size:2rem">📚</span>
    <div>
      <h1>Dashboard de Max</h1>
      <p style="font-size:.65rem;color:var(--ts);opacity:.8">Centro de Comando</p>
    </div>
  </div>
  <div class="status">
    <span class="pulse"></span>
    <span id="statusText">Online</span>
  </div>
</div>

<!-- Agents Section -->
<div class="agents-section">
  <h2 class="section-title">🤖 Agentes Activos</h2>
  <div class="agents-grid" id="agentsList">
    <!-- Populated by JS -->
  </div>
</div>

<!-- Projects Section -->
<div class="projects-section">
  <h2 class="section-title">📁 Proyectos</h2>
  <div id="projectsList">
    <!-- Populated by JS -->
  </div>
</div>

<!-- Stats Section -->
<div class="stats-section">
  <h2 class="section-title">📊 Estadísticas</h2>
  <div class="stats-grid" id="statsGrid">
    <!-- Populated by JS -->
  </div>
</div>

<!-- Activity Section -->
<div class="activity-section">
  <h2 class="section-title">📋 Actividad Reciente</h2>
  <div class="activity-log" id="activityLog">
    <!-- Populated by JS -->
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <p>📚 Max — Asistente Personal Digital</p>
  <p>Última actualización: <span id="lastUpdate">--</span></p>
</div>

</div>

<script>
// Pokemon-style pixel art sprites (base64 encoded small images)
const SPRITES = {
  max: 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><rect fill="#6366f1" width="16" height="16" rx="2"/><rect fill="#4f46e5" x="2" y="2" width="12" height="6" rx="1"/><circle fill="#fcd5ce" cx="8" cy="6" r="3"/><circle fill="#1a1a2e" cx="6.5" cy="5.5" r="1"/><circle fill="#1a1a2e" cx="9.5" cy="5.5" r="1"/><rect fill="#f472b6" x="4" y="10" width="8" height="4" rx="1"/></svg>`),
  researcher: 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><rect fill="#22c55e" width="16" height="16" rx="2"/><circle fill="#fcd5ce" cx="8" cy="5" r="4"/><circle fill="#1a1a2e" cx="6" cy="4" r="1"/><circle fill="#1a1a2e" cx="10" cy="4" r="1"/><rect fill="#fff" x="3" y="1" width="10" height="2" rx="1"/><rect fill="#1a1a2e" x="6" y="10" width="4" height="4" rx="1"/></svg>`),
  writer: 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><rect fill="#f59e0b" width="16" height="16" rx="2"/><circle fill="#fcd5ce" cx="8" cy="5" r="4"/><circle fill="#1a1a2e" cx="6" cy="4" r="1"/><circle fill="#1a1a2e" cx="10" cy="4" r="1"/><rect fill="#1a1a2e" x="3" y="10" width="10" height="2" rx="1"/><rect fill="#fff" x="3" y="13" width="6" height="2" rx="1"/></svg>`),
  developer: 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><rect fill="#22d3ee" width="16" height="16" rx="2"/><circle fill="#fcd5ce" cx="8" cy="5" r="4"/><circle fill="#1a1a2e" cx="6" cy="4" r="1"/><circle fill="#1a1a2e" cx="10" cy="4" r="1"/><rect fill="#1a1a2e" x="4" y="10" width="8" height="5" rx="1"/><rect fill="#22d3ee" x="6" y="12" width="4" height="2" rx="1"/></svg>`),
  default: 'data:image/svg+xml,' + encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16"><rect fill="#94a3b8" width="16" height="16" rx="2"/><circle fill="#fcd5ce" cx="8" cy="5" r="4"/><circle fill="#1a1a2e" cx="6" cy="4" r="1"/><circle fill="#1a1a2e" cx="10" cy="4" r="1"/><rect fill="#1a1a2e" x="5" y="10" width="6" height="5" rx="1"/></svg>`)
};

// Fetch and render data
async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    const data = await res.json();
    renderAgents(data.agents || []);
    renderProjects(data.projects || []);
    renderStats(data.stats || {});
    renderActivity(data.activities || []);
    document.getElementById('statusText').textContent = data.status || 'Online';
    document.getElementById('lastUpdate').textContent = new Date(data.updated).toLocaleString('es-MX');
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
  } catch (e) {
    console.error('Error loading data:', e);
    document.getElementById('statusText').textContent = 'Offline';
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
  }
}

function renderAgents(agents) {
  const container = document.getElementById('agentsList');
  if (agents.length === 0) {
    // Default: show Max as main agent
    container.innerHTML = `
      <div class="agent-card active">
        <div class="agent-header">
          <img src="${SPRITES.max}" class="agent-sprite sprite-animate" alt="Max">
          <div class="agent-info">
            <div class="agent-name">Max <span class="badge">Principal</span></div>
            <div class="agent-role">Asistente Personal Digital</div>
          </div>
        </div>
        <div class="agent-status">
          <span class="dot active"></span>
          <span>Trabajando en proyectos</span>
        </div>
      </div>
    `;
    return;
  }
  
  container.innerHTML = agents.map(agent => {
    const sprite = SPRITES[agent.type] || SPRITES.default;
    const statusClass = agent.status === 'active' ? 'active' : agent.status === 'working' ? 'working' : '';
    const dotClass = agent.status === 'active' ? 'active' : agent.status === 'working' ? 'working' : 'idle';
    const spriteClass = agent.status === 'working' ? 'sprite-working' : 'sprite-animate';
    
    return `
      <div class="agent-card ${statusClass}">
        <div class="agent-header">
          <img src="${sprite}" class="agent-sprite ${spriteClass}" alt="${agent.name}">
          <div class="agent-info">
            <div class="agent-name">${agent.name} ${agent.badge ? `<span class="badge">${agent.badge}</span>` : ''}</div>
            <div class="agent-role">${agent.role}</div>
          </div>
        </div>
        <div class="agent-status">
          <span class="dot ${dotClass}"></span>
          <span>${agent.activity || 'En espera'}</span>
        </div>
      </div>
    `;
  }).join('');
}

function renderProjects(projects) {
  const container = document.getElementById('projectsList');
  container.innerHTML = projects.map(project => {
    const activeClass = project.status === 'in-progress' ? 'active' : '';
    return `
      <div class="project-card ${activeClass}">
        <div class="project-header">
          <span class="project-name">${project.name}</span>
          <span style="font-size:.7rem;color:var(--${project.status === 'completed' ? 'g' : project.status === 'in-progress' ? 'a' : 'ts'})">${project.status === 'completed' ? '✅ Completado' : project.status === 'in-progress' ? '🔄 En progreso' : '⏳ Pendiente'}</span>
        </div>
        <p class="project-desc">${project.description}</p>
        <div class="progress-container">
          <div class="progress-bar" style="width:${project.progress}%"></div>
        </div>
        <p class="progress-text">${project.progress}% completado</p>
      </div>
    `;
  }).join('');
}

function renderStats(stats) {
  const container = document.getElementById('statsGrid');
  const items = [
    { icon: '📝', value: stats.tasks || 0, label: 'Tareas' },
    { icon: '📁', value: stats.projects || 0, label: 'Proyectos' },
    { icon: '⏱️', value: stats.hours || 0, label: 'Horas' },
    { icon: '✨', value: stats.ideas || 0, label: 'Ideas' }
  ];
  container.innerHTML = items.map(item => `
    <div class="stat-card">
      <div class="stat-icon">${item.icon}</div>
      <div class="stat-value">${item.value}</div>
      <div class="stat-label">${item.label}</div>
    </div>
  `).join('');
}

function renderActivity(activities) {
  const container = document.getElementById('activityLog');
  container.innerHTML = activities.map(activity => `
    <div class="activity-item">
      <span class="activity-icon">${activity.icon}</span>
      <div class="activity-content">
        <p class="activity-text">${activity.text}</p>
        <p class="activity-time">${activity.time}</p>
      </div>
    </div>
  `).join('');
}

// PWA Install
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installPrompt').classList.add('show');
});

document.getElementById('installBtn')?.addEventListener('click', async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    if (outcome === 'accepted') {
      document.getElementById('installPrompt').classList.remove('show');
    }
    deferredPrompt = null;
  }
});

document.getElementById('installClose')?.addEventListener('click', () => {
  document.getElementById('installPrompt').classList.remove('show');
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(console.error);
}

// Initial load
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
