<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#1a1525">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="styles.css">
<title>El Mundo de Max</title>
</head>
<body>

<div class="game-container">
  <!-- Room Scene -->
  <div class="room-scene">
    <div class="wall-pattern"></div>
    
    <!-- Window with stars -->
    <div class="window">
      <div class="window-frame"></div>
      <div class="window-frame-v"></div>
      <div class="stars">
        <div class="star" style="top:15%;left:20%"></div>
        <div class="star" style="top:35%;left:70%;animation-delay:0.5s"></div>
        <div class="star" style="top:60%;left:40%;animation-delay:1s"></div>
        <div class="star" style="top:25%;left:85%;animation-delay:1.5s"></div>
      </div>
    </div>
    <div class="moon"></div>
    
    <!-- Desk -->
    <div class="desk">
      <div class="desk-top"></div>
      <div class="desk-front">
        <div class="desk-drawer"></div>
        <div class="desk-drawer"></div>
      </div>
      <div class="desk-items">
        <div class="coffee-cup">
          <div class="cup-top"></div>
          <div class="cup-body"></div>
          <div class="cup-handle"></div>
          <div class="steam">~</div>
        </div>
        <div class="book-stack">
          <div class="book"></div>
          <div class="book"></div>
          <div class="book"></div>
          <div class="book"></div>
        </div>
        <div class="plant">
          <div class="plant-leaves">🌿</div>
          <div class="plant-pot"></div>
        </div>
      </div>
    </div>
    
    <!-- Monitor -->
    <div class="monitor">
      <div class="monitor-frame">
        <div class="monitor-screen">
          <div class="screen-content">
            <div class="screen-lines">
              <div id="screenLine1">> Cargando...</div>
              <div id="screenLine2">> Esperando...</div>
            </div>
          </div>
        </div>
      </div>
      <div class="monitor-stand"></div>
      <div class="monitor-base"></div>
    </div>
    
    <!-- Character -->
    <div class="character" id="character">
      <div class="chair">
        <div class="chair-back"></div>
        <div class="chair-seat"></div>
      </div>
      <div class="char-sprite">
        <!-- Hair -->
        <div class="char-hair"></div>
        <div class="char-bangs"></div>
        <!-- Head -->
        <div class="char-head">
          <div class="char-eyes">
            <div class="char-eye"></div>
            <div class="char-eye"></div>
          </div>
          <div class="char-mouth"></div>
        </div>
        <!-- Body -->
        <div class="char-body"></div>
        <!-- Arms -->
        <div class="char-arm left">
          <div class="char-hand"></div>
        </div>
        <div class="char-arm right">
          <div class="char-hand"></div>
        </div>
      </div>
      <!-- Speech Bubble -->
      <div class="speech-bubble" id="speechBubble">
        ¡Hola! Soy Max 📚
      </div>
    </div>
  </div>
  
  <!-- Activity Panel -->
  <div class="activity-panel">
    <div class="activity-header">
      <span class="activity-icon-large" id="activityIcon">⌨️</span>
      <div class="activity-info">
        <h3 id="activityTitle">Cargando actividad...</h3>
        <p id="activityDesc">Preparando el mundo</p>
      </div>
    </div>
  </div>
  
  <!-- Projects Panel -->
  <div class="projects-panel">
    <div class="panel-title">📁 Proyectos Activos</div>
    <div id="projectsList">
      <div class="project-item">
        <div class="project-icon">📂</div>
        <div class="project-info">
          <div class="project-name">Cargando...</div>
          <div class="project-desc">Preparando proyectos</div>
        </div>
        <div class="project-progress">
          <div class="progress-circle" style="--progress:0%">0%</div>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-item">
      <div class="stat-value" id="statTasks">0</div>
      <div class="stat-label">Tareas</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statProjects">0</div>
      <div class="stat-label">Proyectos</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statHours">0</div>
      <div class="stat-label">Horas</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statIdeas">0</div>
      <div class="stat-label">Ideas</div>
    </div>
  </div>
  
  <!-- Activity Log -->
  <div class="log-panel">
    <div class="panel-title">📋 Actividad Reciente</div>
    <div id="logList">
      <div class="log-item">
        <span class="log-icon">⚡</span>
        <span class="log-time">--:--</span>
        <span class="log-text">Iniciando...</span>
      </div>
    </div>
  </div>
  
  <!-- Footer -->
  <div class="footer">
    <div class="footer-text">📚 Max — Asistente Personal Digital</div>
    <div class="footer-text" style="opacity:0.7">Última actualización: <span id="lastUpdate">--</span></div>
  </div>
</div>

<script>
// Messages for speech bubble
const MESSAGES = [
  "¡Trabajando en tus proyectos!",
  "Analizando datos...",
  "¡Nueva idea detectada!",
  "Revisando el progreso...",
  "Optimizando todo...",
  "¡Casi termino esto!",
  "Pensando en marketing...",
  "Organizando tareas..."
];

// Screen text options
const SCREEN_TEXTS = {
  coding: ["> Escribiendo código...", "> dashboard.js", "> Compilando..."],
  thinking: ["> Analizando...", "> Procesando datos...", "> 🤔 Pensando..."],
  writing: ["> Redactando...", "> content.md", "> Guardando..."],
  researching: ["> Buscando...", "> Analizando resultados...", "> 🔍 Investigando..."],
  idle: ["> En espera...", "> Listo para ayudar", "> Esperando tareas..."]
};

let currentMessage = 0;
let data = null;

// Update screen text based on activity
function updateScreen(activity) {
  const texts = SCREEN_TEXTS[activity] || SCREEN_TEXTS.idle;
  document.getElementById('screenLine1').textContent = texts[0];
  document.getElementById('screenLine2').textContent = texts[1];
}

// Cycle through messages
function nextMessage() {
  const bubble = document.getElementById('speechBubble');
  currentMessage = (currentMessage + 1) % MESSAGES.length;
  bubble.textContent = MESSAGES[currentMessage];
}

// Render projects
function renderProjects(projects) {
  const container = document.getElementById('projectsList');
  if (!projects || projects.length === 0) {
    container.innerHTML = `
      <div class="project-item">
        <div class="project-icon">📭</div>
        <div class="project-info">
          <div class="project-name">Sin proyectos</div>
          <div class="project-desc">Esperando asignaciones</div>
        </div>
        <div class="project-progress">
          <div class="progress-circle" style="--progress:0%">0%</div>
        </div>
      </div>
    `;
    return;
  }
  
  container.innerHTML = projects.map(p => {
    const icon = p.status === 'completed' ? '✅' : p.status === 'in-progress' ? '🔄' : '📂';
    const activeClass = p.status === 'in-progress' ? 'active' : '';
    return `
      <div class="project-item ${activeClass}">
        <div class="project-icon">${icon}</div>
        <div class="project-info">
          <div class="project-name">${p.name}</div>
          <div class="project-desc">${p.description}</div>
        </div>
        <div class="project-progress">
          <div class="progress-circle" style="--progress:${p.progress}%">${p.progress}%</div>
        </div>
      </div>
    `;
  }).join('');
}

// Render activity log
function renderLog(activities) {
  const container = document.getElementById('logList');
  if (!activities || activities.length === 0) {
    container.innerHTML = `
      <div class="log-item">
        <span class="log-icon">📭</span>
        <span class="log-time">--:--</span>
        <span class="log-text">Sin actividad reciente</span>
      </div>
    `;
    return;
  }
  
  container.innerHTML = activities.slice(0, 5).map(a => `
    <div class="log-item">
      <span class="log-icon">${a.icon}</span>
      <span class="log-time">${a.time}</span>
      <span class="log-text">${a.text}</span>
    </div>
  `).join('');
}

// Update stats
function updateStats(stats) {
  document.getElementById('statTasks').textContent = stats?.tasks || 0;
  document.getElementById('statProjects').textContent = stats?.projects || 0;
  document.getElementById('statHours').textContent = stats?.hours || 0;
  document.getElementById('statIdeas').textContent = stats?.ideas || 0;
}

// Update activity panel
function updateActivity(currentActivity) {
  document.getElementById('activityIcon').textContent = currentActivity?.icon || '⌨️';
  document.getElementById('activityTitle').textContent = currentActivity?.title || 'En espera';
  document.getElementById('activityDesc').textContent = currentActivity?.description || 'Esperando tareas';
  updateScreen(currentActivity?.screen || 'idle');
  
  if (currentActivity?.message) {
    document.getElementById('speechBubble').textContent = currentActivity.message;
  }
}

// Fetch data
async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    data = await res.json();
    
    updateActivity(data.currentActivity);
    renderProjects(data.projects);
    updateStats(data.stats);
    renderLog(data.activities);
    
    document.getElementById('lastUpdate').textContent = 
      new Date(data.updated).toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
  } catch (e) {
    console.error('Error loading data:', e);
    document.getElementById('activityTitle').textContent = 'Sin conexión';
    document.getElementById('activityDesc').textContent = 'Reconectando...';
  }
}

// Initialize
setInterval(nextMessage, 5000);
setInterval(loadData, 60000);
loadData();

// Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
