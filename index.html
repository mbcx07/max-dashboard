<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#12101a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="styles.css">
<title>Max - Asistente Anime</title>
</head>
<body>

<div class="game-container">
  <!-- Character Scene -->
  <div class="character-scene">
    <!-- Stars -->
    <div class="stars">
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
    </div>
    
    <!-- Moon -->
    <div class="moon"></div>
    
    <!-- Character -->
    <div class="character">
      <!-- Speech bubble -->
      <div class="speech-bubble" id="speechBubble">¡Hola! Soy Max 💜</div>
      
      <!-- Head -->
      <div class="head">
        <!-- Hair back -->
        <div class="hair-back"></div>
        
        <!-- Hair sides -->
        <div class="hair-side left"></div>
        <div class="hair-side right"></div>
        
        <!-- Face container -->
        <div class="face-container">
          <!-- Face -->
          <div class="face">
            <!-- Hair front -->
            <div class="hair-front"></div>
            
            <!-- Bangs -->
            <div class="bangs">
              <div class="bang"></div>
              <div class="bang"></div>
              <div class="bang"></div>
              <div class="bang"></div>
              <div class="bang"></div>
            </div>
            
            <!-- Eyebrows -->
            <div class="eyebrows">
              <div class="eyebrow left"></div>
              <div class="eyebrow right"></div>
            </div>
            
            <!-- Eyes -->
            <div class="eyes">
              <div class="eye">
                <div class="eye-iris">
                  <div class="eye-pupil"></div>
                </div>
                <div class="eye-shine large"></div>
                <div class="eye-shine small"></div>
                <div class="eye-shine tiny"></div>
              </div>
              <div class="eye">
                <div class="eye-iris">
                  <div class="eye-pupil"></div>
                </div>
                <div class="eye-shine large"></div>
                <div class="eye-shine small"></div>
                <div class="eye-shine tiny"></div>
              </div>
            </div>
            
            <!-- Blush -->
            <div class="blush left"></div>
            <div class="blush right"></div>
            
            <!-- Nose -->
            <div class="nose"></div>
            
            <!-- Mouth -->
            <div class="mouth">
              <div class="mouth-shape" id="charMouth"></div>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Neck -->
      <div class="neck"></div>
      
      <!-- Body -->
      <div class="body"></div>
      
      <!-- Arms -->
      <div class="arm left">
        <div class="hand"></div>
      </div>
      <div class="arm right">
        <div class="hand"></div>
      </div>
      
      <!-- Activity badge -->
      <div class="activity-badge">
        <span class="activity-icon" id="activityIcon">💜</span>
        <span class="activity-text" id="activityText">Cargando...</span>
      </div>
    </div>
  </div>
  
  <!-- Chat Panel -->
  <div class="chat-panel">
    <div class="chat-header">
      <div class="chat-avatar">📚</div>
      <div class="chat-title">
        <h3>Chat con Max</h3>
        <div class="chat-status">
          <span class="status-dot"></span>
          <span>Conectada contigo</span>
        </div>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message bot">¡Hola! Soy Max 💜 Escribe algo y te responderé.</div>
    </div>
    <div class="chat-input-area">
      <input type="text" class="chat-input" id="chatInput" placeholder="Escribe un mensaje..." maxlength="500">
      <button class="chat-send" id="chatSend">➤</button>
    </div>
  </div>
  
  <!-- Projects Panel -->
  <div class="projects-panel">
    <div class="panel-title">📁 Proyectos Activos</div>
    <div id="projectsList">
      <div class="project-item">
        <span class="project-icon">📂</span>
        <div class="project-info">
          <div class="project-name">Cargando...</div>
          <div class="project-desc">Preparando</div>
        </div>
        <div class="progress-bar-container"><div class="progress-bar-fill" style="width:0%"></div></div>
        <span class="project-percent">0%</span>
      </div>
    </div>
  </div>
  
  <!-- Stats Grid -->
  <div class="stats-panel">
    <div class="panel-title">📊 Estadísticas</div>
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-value" id="statTasks">0</div>
        <div class="stat-label">Tareas</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statProjects">0</div>
        <div class="stat-label">Proyectos</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statHours">0</div>
        <div class="stat-label">Horas</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statIdeas">0</div>
        <div class="stat-label">Ideas</div>
      </div>
    </div>
  </div>
  
  <!-- Log Panel -->
  <div class="log-panel">
    <div class="panel-title">📋 Actividad</div>
    <div id="logList">
      <div class="log-item">
        <span class="log-icon">⚡</span>
        <span class="log-time">--:--</span>
        <span class="log-text">Iniciando...</span>
      </div>
    </div>
  </div>
  
  <!-- Footer -->
  <div class="footer">
    <div class="footer-text">📚 Max — Asistente Personal Digital</div>
    <div class="footer-text" style="opacity:0.7">Actualizado: <span id="lastUpdate">--</span></div>
  </div>
</div>

<script>
// Messages
const MESSAGES = [
  "¡Trabajando en tus proyectos! 💜",
  "Analizando datos... 📊",
  "¡Nueva idea! ✨",
  "Revisando progreso... 📈",
  "Organizando tareas... 📋",
  "¡Casi termino! 🎉",
  "Pensando... 💭",
  "¡Lista para ayudar! 💪"
];

let currentMessage = 0;

// Responses
const RESPONSES = {
  greeting: ["¡Hola! 👋 ¿En qué puedo ayudarte?", "¡Hey! Soy Max 💜", "¡Hola! Estoy aquí para ayudarte 📚"],
  status: ["Todo va bien 😊", "Trabajando en proyectos... 💜", "Analizando ideas ✨"],
  help: ["Puedo ayudarte con:\n• Proyectos\n• Estadísticas\n• Preguntas 💜", "¿Qué necesitas? 📚"],
  projects: ["Tienes 2 proyectos:\n• Psicofrecuencia.com (25%)\n• Dashboard (99%) 💜", "Proyectos avanzando 📊"],
  unknown: ["Interesante... 🤔", "Hmm, pensando... 💭", "¡Buena pregunta! 💜"],
  positive: ["¡Excelente! 😊💜", "¡Genial! 🎉", "¡Perfecto! ✨"]
};

// Chat
function addMessage(text, isUser = false) {
  const container = document.getElementById('chatMessages');
  const msg = document.createElement('div');
  msg.className = `message ${isUser ? 'user' : 'bot'}`;
  msg.textContent = text;
  container.appendChild(msg);
  container.scrollTop = container.scrollHeight;
}

function getResponse(input) {
  const text = input.toLowerCase().trim();
  if (text.match(/hola|hey|hi|buenos/)) return RESPONSES.greeting[Math.floor(Math.random() * 3)];
  if (text.match(/cómo estás|status|qué tal/)) return RESPONSES.status[Math.floor(Math.random() * 3)];
  if (text.match(/ayuda|help|qué puedes/)) return RESPONSES.help[Math.floor(Math.random() * 2)];
  if (text.match(/proyectos|projects/)) return RESPONSES.projects[Math.floor(Math.random() * 2)];
  if (text.match(/gracias|genial|perfecto|bien/)) return RESPONSES.positive[Math.floor(Math.random() * 3)];
  if (text.match(/quién eres|tu nombre/)) return "Soy Max, tu asistente personal 💜";
  return RESPONSES.unknown[Math.floor(Math.random() * 3)];
}

function sendMessage() {
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;
  
  addMessage(text, true);
  input.value = '';
  document.getElementById('speechBubble').textContent = 'Pensando... 💭';
  
  setTimeout(() => {
    const response = getResponse(text);
    addMessage(response, false);
    document.getElementById('speechBubble').textContent = response.split('\n')[0].substring(0, 25) + (response.length > 25 ? '...' : '');
  }, 500);
}

document.getElementById('chatSend').addEventListener('click', sendMessage);
document.getElementById('chatInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });

// Render
function renderProjects(projects) {
  const container = document.getElementById('projectsList');
  if (!projects?.length) {
    container.innerHTML = '<div class="project-item"><span class="project-icon">📭</span><div class="project-info"><div class="project-name">Sin proyectos</div></div><div class="progress-bar-container"><div class="progress-bar-fill" style="width:0%"></div></div><span class="project-percent">0%</span></div>';
    return;
  }
  container.innerHTML = projects.map(p => `<div class="project-item ${p.status === 'in-progress' ? 'active' : ''}"><span class="project-icon">${p.status === 'completed' ? '✅' : p.status === 'in-progress' ? '🔄' : '📂'}</span><div class="project-info"><div class="project-name">${p.name}</div><div class="project-desc">${p.description}</div></div><div class="progress-bar-container"><div class="progress-bar-fill" style="width:${p.progress}%"></div></div><span class="project-percent">${p.progress}%</span></div>`).join('');
}

function renderLog(activities) {
  const container = document.getElementById('logList');
  if (!activities?.length) {
    container.innerHTML = '<div class="log-item"><span class="log-icon">📭</span><span class="log-time">--:--</span><span class="log-text">Sin actividad</span></div>';
    return;
  }
  container.innerHTML = activities.slice(0, 5).map(a => `<div class="log-item"><span class="log-icon">${a.icon}</span><span class="log-time">${a.time}</span><span class="log-text">${a.text}</span></div>`).join('');
}

function updateStats(stats) {
  document.getElementById('statTasks').textContent = stats?.tasks || 0;
  document.getElementById('statProjects').textContent = stats?.projects || 0;
  document.getElementById('statHours').textContent = stats?.hours || 0;
  document.getElementById('statIdeas').textContent = stats?.ideas || 0;
}

function updateActivity(currentActivity) {
  document.getElementById('activityIcon').textContent = currentActivity?.icon || '💜';
  document.getElementById('activityText').textContent = currentActivity?.title || 'En espera';
  if (currentActivity?.message) document.getElementById('speechBubble').textContent = currentActivity.message;
}

// Load
async function loadData() {
  try {
    const res = await fetch('data.json?t=' + Date.now());
    const data = await res.json();
    updateActivity(data.currentActivity);
    renderProjects(data.projects);
    updateStats(data.stats);
    renderLog(data.activities);
    document.getElementById('lastUpdate').textContent = new Date(data.updated).toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'});
  } catch (e) {
    document.getElementById('activityText').textContent = 'Sin conexión';
  }
}

setInterval(() => { currentMessage = (currentMessage + 1) % MESSAGES.length; document.getElementById('speechBubble').textContent = MESSAGES[currentMessage]; }, 8000);
setInterval(loadData, 60000);
loadData();

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
</script>
</body>
</html>
